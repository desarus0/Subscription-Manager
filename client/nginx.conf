server {
    listen 80;
    server_name recur-app.com www.recur-app.com;
    return 301 https://$host$request_uri;
} 

server {
    listen 443 ssl;
    server_name recur-app.com www.recur-app.com;

    ssl_certificate /etc/letsencrypt/live/recur-app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recur-app.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes go to index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable nginx version in error pages
    server_tokens off;
}